name: yojna_plus
description: "govt yojna jaankari hindi main."
publish_to: 'none'
version: 1.5.0+7

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  url_launcher: ^6.3.0
  flutter_inappwebview: ^6.0.0
  permission_handler: ^11.3.1
  in_app_update: ^4.2.2
  package_info_plus: ^8.0.2
  firebase_core: ^4.0.0
  firebase_analytics: ^12.0.0
  firebase_messaging: ^16.0.0
  cloud_firestore: ^6.0.0
  share_plus: ^11.1.0
  shared_preferences: ^2.3.2
  motion_tab_bar: ^2.0.4
  circular_reveal_animation: ^2.0.2
  circle_splash: ^1.0.2
  flutter_tts: ^4.2.3
  pdfx: ^2.5.0
  http: ^1.2.2
  path_provider: ^2.1.4
  google_mobile_ads: ^6.0.0
  printing: ^5.13.4
  pdf: ^3.10.7
  file_saver: ^0.3.1
  flutter_pdfview: ^1.4.3
  path: ^1.9.0
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/launcher/

# Launcher icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/launcher/yojnalogo.jpg
  min_sdk_android: 21
