name: yojna_plus
description: "govt yojna jaankari hindi main."
publish_to: 'none'
version: 3.3.0+17

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0
  flutter_inappwebview: ^6.0.0
  flutter_pdfview: ^1.3.2
  permission_handler: ^11.3.1
  in_app_update: ^4.2.2
  package_info_plus: ^8.0.2
  firebase_core: ^4.0.0
  firebase_analytics: ^12.0.0
